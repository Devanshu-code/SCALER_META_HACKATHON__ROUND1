version = 1
requires-python = ">=3.9"

[[package]]
name = "feed-ranking"
version = "1.0.0"
source = { editable = "." }
dependencies = [
    { name = "fastapi" },
    { name = "uvicorn" },
    { name = "openai" },
    { name = "python-dotenv" },
    { name = "openenv-core" },
]

[package.metadata]
requires-dist = [
    { name = "fastapi", specifier = ">=0.104.0" },
    { name = "uvicorn", extras = ["standard"], specifier = ">=0.24.0" },
    { name = "openai", specifier = ">=1.0.0" },
    { name = "python-dotenv", specifier = ">=1.0.0" },
    { name = "openenv-core", specifier = ">=0.2.0" },
]
